version: "3.9"
services:
  server:
    build: .
    expose: ["3000"]
    environment:
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=cheats
    depends_on: [db]

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cheats
    volumes: [db_data:/var/lib/postgresql/data]

  nginx:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt
    ports: ["80:80","443:443"]
    depends_on: [server]

  certbot:
    image: certbot/certbot
    volumes: [/etc/letsencrypt:/etc/letsencrypt]
    entrypoint: >
      sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"

volumes: {db_data:}